name: IPSum Feed to STIX Processor

on:
  schedule:
    # Run daily at 02:00 UTC (1 hour after feed updates at 01:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      category_score:
        description: 'IPSum category score (1-8)'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
          - '7'
          - '8'
        default: '4'

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Process IPSum feed and create STIX bundle
        id: process
        run: |
          set -e
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CATEGORY_SCORE="${{ inputs.category_score }}"
          else
            CATEGORY_SCORE="4"
          fi
          
          echo "Processing IPSum feed with category score: $CATEGORY_SCORE"
          python processors/ipsum/ipsum.py --category_score "$CATEGORY_SCORE"
      
      - name: Upload bundle to CTX
        env:
          CTX_BASE_URL: ${{ secrets.CTX_BASE_URL }}
          CTX_API_KEY: ${{ secrets.CTX_API_KEY }}
          IPSUM_FEED_ID: ${{ vars.IPSUM_FEED_ID }}
        run: |
          BUNDLE_PATH="${{ steps.process.outputs.bundle_path }}"
          
          if [ -z "$BUNDLE_PATH" ] || [ ! -f "$BUNDLE_PATH" ]; then
            echo "Error: Bundle was not created at $BUNDLE_PATH"
            exit 1
          fi
          
          if [ -z "$IPSUM_FEED_ID" ]; then
            echo "Error: IPSUM_FEED_ID variable is not set"
            exit 1
          fi
          
          echo "Uploading $BUNDLE_PATH to feed $IPSUM_FEED_ID..."
          python helpers/upload.py "$BUNDLE_PATH" --feed_id "$IPSUM_FEED_ID"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipsum-upload-artifacts
          path: |
            ${{ steps.process.outputs.bundle_path }}
            upload_artifacts/
          retention-days: 7
