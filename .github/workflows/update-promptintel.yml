name: "[Update CTX] PromptIntel"
run-name: |
  [Update CTX] PromptIntel
  ${{ github.event_name == 'workflow_dispatch' && inputs.since_date != ''
      && format(' @from:{0}', inputs.since_date) || '' }}
  ${{ github.event_name == 'workflow_dispatch' && inputs.until_date != ''
      && format(' @to:{0}', inputs.until_date) || '' }}

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Which environment(s) to run'
        required: true
        type: choice
        options:
          - all
          - staging
          - production
        default: all
      since_date:
        description: 'Start date for filtering prompts. Use "auto" to use last run date.'
        required: false
        type: string
        default: 'auto'
      until_date:
        description: 'End date for filtering prompts.'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_env: ${{ fromJson((github.event_name != 'workflow_dispatch' || github.event.inputs.target_environment == 'all') && '["cyberthreatexchange-updates-production","cyberthreatexchange-updates-staging"]' || (github.event.inputs.target_environment == 'staging') && '["cyberthreatexchange-updates-staging"]' || (github.event.inputs.target_environment == 'production') && '["cyberthreatexchange-updates-production"]' || '["cyberthreatexchange-updates-production","cyberthreatexchange-updates-staging"]') }}
    environment: ${{ matrix.target_env }}
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get modified time for latest indicator processed in feed
        id: last_run
        env:
          CTX_BASE_URL: ${{ secrets.CTX_BASE_URL }}
          CTX_API_KEY: ${{ secrets.CTX_API_KEY }}
        run: python helpers/latest_timestamp.py "${{ vars.PROMPTINTEL_FEED_ID }}" --object-type indicator

      - name: Process PromptIntel feed and create STIX bundles
        id: process
        env:
          CTIBUTLER_BASE_URL: ${{ secrets.CTIBUTLER_BASE_URL }}
          CTIBUTLER_API_KEY: ${{ secrets.CTIBUTLER_API_KEY }}
          PROMPTINTEL_API_KEY: ${{ secrets.PROMPTINTEL_API_KEY }}
        run: |
          set -e

          latest_timestamp="${{ steps.last_run.outputs.latest_timestamp }}"
          latest_timestamp=$(echo "$latest_timestamp" | tr -d '"')
          since_date="${{ inputs.since_date }}"
          until_date="${{ inputs.until_date }}"

          CMD="python processors/promptintel/promptintel.py"

          if [ "$since_date" = "auto" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -n "$latest_timestamp" ]; then
              CMD="$CMD --since-date '$latest_timestamp'"
            fi
          elif [ -n "$since_date" ]; then
            CMD="$CMD --since-date '$since_date'"
          fi

          if [ -n "$until_date" ]; then
            CMD="$CMD --until-date '$until_date'"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Upload bundles to CTX
        id: upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CTX_BASE_URL: ${{ secrets.CTX_BASE_URL }}
          CTX_API_KEY: ${{ secrets.CTX_API_KEY }}
          PROMPTINTEL_FEED_ID: ${{ vars.PROMPTINTEL_FEED_ID }}
          MAX_BUNDLE_SIZE_KB: ${{ vars.MAX_BUNDLE_SIZE_KB }}
          ARTIFACT_PREFIX: ${{ matrix.target_env }}
        run: |
          BUNDLE_PATH="${{ steps.process.outputs.bundle_path }}"

          if [ -z "$BUNDLE_PATH" ] || [ ! -d "$BUNDLE_PATH" ]; then
            echo "Error: Bundle directory was not created at $BUNDLE_PATH"
            exit 1
          fi

          if [ -z "$PROMPTINTEL_FEED_ID" ]; then
            echo "Error: PROMPTINTEL_FEED_ID variable is not set"
            exit 1
          fi

          echo "Uploading bundles from $BUNDLE_PATH to feed $PROMPTINTEL_FEED_ID..."
          python helpers/upload.py "$BUNDLE_PATH" --feed_id "$PROMPTINTEL_FEED_ID"

      - name: Upload dedupe database
        if: ${{ always() && steps.upload.outputs.has_success == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.upload.outputs.dedupe_artifact_name }}
          path: ${{ steps.upload.outputs.dedupe_path }}
          retention-days: 90

      - name: Upload failed bundles
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.upload.outputs.failed_artifact_name }}
          path: upload_artifacts/failed_bundles/
          retention-days: 7

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promptintel-upload-artifacts-${{ matrix.target_env }}
          path: |
            outputs/
            upload_artifacts/
          retention-days: 7
