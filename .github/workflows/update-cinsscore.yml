name: CINS Score Feed to STIX Processor

on:
  # schedule:
  #   # Run daily at 04:00 UTC
  #   - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Which environment(s) to run'
        required: true
        type: choice
        options:
          - all
          - staging
          - production
        default: all

jobs:
  process-and-upload:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target_environment == 'all' ||
      (github.event.inputs.target_environment == 'staging' && contains(matrix.target_env, 'staging')) ||
      (github.event.inputs.target_environment == 'production' && contains(matrix.target_env, 'production'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_env:
          - cyberthreatexchange-updates-production
          - cyberthreatexchange-updates-staging
    environment: ${{ matrix.target_env }}
    env:
      PYTHONPATH: .
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Process CINS Score feed and create STIX bundle
        id: process
        run: |
          set -e
          echo "Processing CINS Score feed..."
          python processors/cinsscore/cinsscore.py
      
      - name: Upload bundle to CTX
        id: upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CTX_BASE_URL: ${{ secrets.CTX_BASE_URL }}
          CTX_API_KEY: ${{ secrets.CTX_API_KEY }}
          CINSSCORE_FEED_ID: ${{ vars.CINSSCORE_FEED_ID }}
          MAX_BUNDLE_SIZE_KB: ${{ vars.MAX_BUNDLE_SIZE_KB }}
          ARTIFACT_PREFIX: ${{ matrix.target_env }}
        run: |
          BUNDLE_PATH="${{ steps.process.outputs.bundle_path }}"
          
          if [ -z "$CINSSCORE_FEED_ID" ]; then
            echo "Error: CINSSCORE_FEED_ID variable is not set"
            exit 1
          fi
          
          echo "Uploading $BUNDLE_PATH to feed $CINSSCORE_FEED_ID..."
          python helpers/upload.py "$BUNDLE_PATH" --feed_id "$CINSSCORE_FEED_ID"
      
      - name: Upload dedupe database
        if: steps.upload.outputs.dedupe_artifact_name
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.upload.outputs.dedupe_artifact_name }}
          path: ${{ steps.upload.outputs.dedupe_path }}
          retention-days: 90
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cinsscore-upload-artifacts-${{ matrix.target_env }}
          path: |
            ${{ steps.process.outputs.bundle_path }}
            upload_artifacts/
          retention-days: 7
