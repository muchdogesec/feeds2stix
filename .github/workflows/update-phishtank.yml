name: "[Update CTX] PhishTank"

on:
  schedule:
    # Run at 15 minutes past every hour (feed updates hourly at the top of the hour)
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Which environment(s) to run'
        required: true
        type: choice
        options:
          - all
          - staging
          - production
        default: all
      since_date:
        description: 'Process entries with modification time on or after this date (ISO format). Leave empty to process all.'
        required: false
        type: string

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_env: ${{ fromJson((github.event_name != 'workflow_dispatch' || github.event.inputs.target_environment == 'all') && '["cyberthreatexchange-updates-production","cyberthreatexchange-updates-staging"]' || (github.event.inputs.target_environment == 'staging') && '["cyberthreatexchange-updates-staging"]' || (github.event.inputs.target_environment == 'production') && '["cyberthreatexchange-updates-production"]' || '["cyberthreatexchange-updates-production","cyberthreatexchange-updates-staging"]') }}
    environment: ${{ matrix.target_env }}
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Get latest indicator timestamp
        id: get_timestamp
        uses: actions/github-script@v7
        env:
          CTX_BASE_URL: ${{ secrets.CTX_BASE_URL }}
          CTX_API_KEY: ${{ secrets.CTX_API_KEY }}
          PHISHTANK_FEED_ID: ${{ vars.PHISHTANK_FEED_ID }}
        with:
          script: |
            const ctxBaseUrl = process.env.CTX_BASE_URL;
            const ctxApiKey = process.env.CTX_API_KEY;
            const phishtankFeedId = process.env.PHISHTANK_FEED_ID;

            if (!phishtankFeedId) {
              console.log('Error: PHISHTANK_FEED_ID variable is not set');
              process.exit(1);
            }

            try {
              const response = await fetch(`${ctxBaseUrl}/v1/search/?feed_ids=${phishtankFeedId}&page_size=1&sort=modified_descending&types=indicator`, {
                method: 'GET',
                headers: {
                  'accept': 'application/json',
                  'API-KEY': ctxApiKey
                }
              });

              if (!response.ok) {
                throw new Error(`API request failed with status ${response.status}`);
              }

              const data = await response.json();
              const timestamp = data?.data?.objects?.[0]?.modified;

              if (timestamp) {
                console.log(`Latest indicator timestamp: ${timestamp}`);
                core.setOutput('latest_timestamp', timestamp);
              } else {
                console.log('No previous indicators found in feed, will process all entries');
                core.setOutput('latest_timestamp', '');
              }
            } catch (error) {
              console.log(`Warning: Could not fetch latest timestamp: ${error.message}`);
              console.log('Will use default filtering');
              core.setOutput('latest_timestamp', '');
            }

      - name: Process PhishTank feed and create STIX bundles
        id: process
        run: |
          set -e

          since_date="${{ inputs.since_date }}"
          latest_timestamp="${{ steps.get_timestamp.outputs.latest_timestamp }}"
          
          CMD="python processors/phishtank/phishtank.py"
          
          # Determine since_date: use latest_timestamp if available, otherwise use custom date or process all
          if [ -n "$latest_timestamp" ]; then
            CMD="$CMD --since-date '$latest_timestamp'"
            echo "Using latest indicator timestamp: $latest_timestamp"
          elif [ -n "$since_date" ] && [ "$since_date" != "auto" ]; then
            CMD="$CMD --since-date '$since_date'"
            echo "Using custom since_date: $since_date"
          else
            echo "Processing all entries (no timestamp available)"
          fi
          
          echo "Running: $CMD"
          eval $CMD

      - name: Upload bundle to CTX
        id: upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CTX_BASE_URL: ${{ secrets.CTX_BASE_URL }}
          CTX_API_KEY: ${{ secrets.CTX_API_KEY }}
          PHISHTANK_FEED_ID: ${{ vars.PHISHTANK_FEED_ID }}
          MAX_BUNDLE_SIZE_KB: ${{ vars.MAX_BUNDLE_SIZE_KB }}
          ARTIFACT_PREFIX: ${{ matrix.target_env }}
        run: |
          BUNDLE_PATH="${{ steps.process.outputs.bundle_path }}"

          if [ -z "$PHISHTANK_FEED_ID" ]; then
            echo "Error: PHISHTANK_FEED_ID variable is not set"
            exit 1
          fi

          echo "Uploading $BUNDLE_PATH to feed $PHISHTANK_FEED_ID..."
          python helpers/upload.py "$BUNDLE_PATH" --feed_id "$PHISHTANK_FEED_ID"

      - name: Upload dedupe database
        if: steps.upload.outputs.dedupe_artifact_name
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.upload.outputs.dedupe_artifact_name }}
          path: ${{ steps.upload.outputs.dedupe_path }}
          retention-days: 90

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phishtank-upload-artifacts-${{ matrix.target_env }}
          path: |
            ${{ steps.process.outputs.bundle_path }}
            upload_artifacts/
          retention-days: 7
