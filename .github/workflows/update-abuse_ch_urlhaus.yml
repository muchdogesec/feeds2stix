name: Abuse.ch URLhaus Feed to STIX Processor

on:
  # schedule:
  #   # Run every 6 hours
  #   - cron: '*/6 * * * *'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Which environment(s) to run'
        required: true
        type: choice
        options:
          - all
          - staging
          - production
        default: all
      start_date:
        description: 'Start date for filtering records (YYYY-MM-DD[T[HH:MM[:SS]]]). Use "auto" to use last run date, or leave empty to process all.'
        required: false
        type: string
        default: 'auto'

jobs:
  process-and-upload:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target_environment == 'all' ||
      (github.event.inputs.target_environment == 'staging' && contains(matrix.target_env, 'staging')) ||
      (github.event.inputs.target_environment == 'production' && contains(matrix.target_env, 'production'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_env:
          - cyberthreatexchange-updates-production
          - cyberthreatexchange-updates-staging
    environment: ${{ matrix.target_env }}
    env:
      PYTHONPATH: .
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Get last successful workflow run time
        id: last_run
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = 'update-abuse_ch_urlhaus.yml';
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow_id,
              status: 'success',
              per_page: 1
            });
            
            if (runs.data.workflow_runs.length > 0) {
              const lastRun = runs.data.workflow_runs[0];
              const lastRunTime = lastRun.updated_at;
              console.log(`Last successful run: ${lastRunTime}`);
              return lastRunTime;
            } else {
              console.log('No previous successful runs found');
              return '';
            }
      
      - name: Process URLhaus feed and create STIX bundles
        id: process
        run: |
          set -e

          last_run_date="${{ steps.last_run.outputs.result }}"
          # Remove quotes from the result
          last_run_date=$(echo "$last_run_date" | tr -d '"')
          start_date="${{ inputs.start_date }}"
          
          CMD="python processors/abuse_ch_urlhaus/urlhaus.py"
          
          # Determine start_date: use last_run_date for auto/scheduled, or custom date
          if [ "$start_date" = "auto" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -n "$last_run_date" ]; then
              CMD="$CMD --start-date '$last_run_date'"
              echo "Using last run date: $last_run_date"
            fi
          elif [ -n "$start_date" ]; then
            CMD="$CMD --start-date '$start_date'"
          fi
          
          echo "Running: $CMD"
          eval $CMD
      
      - name: Upload bundles to CTX
        id: upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CTX_BASE_URL: ${{ secrets.CTX_BASE_URL }}
          CTX_API_KEY: ${{ secrets.CTX_API_KEY }}
          URLHAUS_FEED_ID: ${{ vars.URLHAUS_FEED_ID }}
          MAX_BUNDLE_SIZE_KB: ${{ vars.MAX_BUNDLE_SIZE_KB }}
        run: |
          BUNDLE_PATH="${{ steps.process.outputs.bundle_path }}"
          
          if [ -z "$BUNDLE_PATH" ] || [ ! -f "$BUNDLE_PATH" ]; then
            echo "Error: Bundle file was not created at $BUNDLE_PATH"
            exit 1
          fi
          
          if [ -z "$URLHAUS_FEED_ID" ]; then
            echo "Error: URLHAUS_FEED_ID variable is not set"
            exit 1
          fi
          
          echo "Uploading bundles from $BUNDLE_PATH to feed $URLHAUS_FEED_ID..."
          python helpers/upload.py "$BUNDLE_PATH" --feed_id "$URLHAUS_FEED_ID"
      
      - name: Upload dedupe database
        if: steps.upload.outputs.dedupe_artifact_name
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.upload.outputs.dedupe_artifact_name }}
          path: ${{ steps.upload.outputs.dedupe_path }}
          retention-days: 90
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: urlhaus-upload-artifacts-${{ matrix.target_env }}
          path: |
            ${{ steps.process.outputs.bundle_path }}
            upload_artifacts/
          retention-days: 3
